name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build native cdylib (Linux)
        run: cargo build --release --manifest-path native/Cargo.toml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ──────────────────────────────────────────────────────────────────────────────
# NOTE — SwiftPM native library distribution
#
# SwiftPM resolves this package from its git tag (v0.3.0).  Because the native
# cdylib is built from source (the `native/` submodule), consumers must build it
# before calling `swift build` / `swift test`:
#
#   git clone --recurse-submodules https://github.com/<org>/FON.swift
#   cargo build --release --manifest-path native/Cargo.toml
#   swift build
#
# Alternative (not implemented here): ship a pre-built XCFramework as a
# `binaryTarget` so consumers don't need Rust.  That would require:
#   1. Building `libfon_native.a` (static) or `libfon_native.dylib` for each
#      platform/arch in the release workflow.
#   2. Packaging them into an XCFramework with `xcodebuild -create-xcframework`.
#   3. Zipping, computing the SHA-256 checksum, and pointing `Package.swift` at
#      the release download URL via `.binaryTarget(name:url:checksum:)`.
# ──────────────────────────────────────────────────────────────────────────────
